<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form demo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">
</head>

<body>
    <div class="container">
        <h1>Form Demo</h1>

        <form action="action" class="mb-3">
            <div class="row">
                <div class="mb-3 col-md-6">
                    <label for="email" class="form-label">Email</label required>
                    <input type="email" id="email" placeholder="example@gmail.com" class="form-control">
                </div>
                <div class="mb-3 col-md-6">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" name="password" id="password" placeholder="Enter your password"
                        class="form-control">
                </div>
            </div>

            <div class="mb-3">
                <label for="Address10" class="form-label">Address</label>
                <input type="text" class="form-control" id="Address10" placeholder="Enter your address">
            </div>
            <div class="mb-3">
                <label for="exampleDataList" class="form-label">choose your city</label>
                <input class="form-control" list="datalistOptions" id="exampleDataList" placeholder="Type to search...">
                <datalist id="datalistOptions">
                    <option value="utter pradas">
                    <option value="delhi">
                    <option value="bihar">
                    <option value="Lucknow">
                    <option value="chandigragh">
                </datalist>
            </div>
            <div class="mb-3">
                <!-- select form style  -->
                <select name="inputselect" id="digit" class="form-select">
                    <option value="select" selected>--select--</option>
                    <option value="1">One</option>
                    <option value="2">Two</option>
                    <option value="3">Three</option>
                    <option value="4">Four</option>
                </select>
            </div>
            <div class="form-check mb-3">
                <input type="checkbox" name="Agree" id="checkdefault" class="form-check-input" checked>
                <label class="form-check-label" for="checkdefault">Agree</label>
            </div>
            <div class="form-check mb-3">
                <input type="radio" id="radiobtn" class="form-check-input">
                <label class="form-check-label" for="radiobtn">Yes/No</label>
            </div>
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" name="switchbtn" id="switchbtn">
                <label class="form-check-label" for="switchbtn">Allow the terms and condition</label>
            </div>
        </form>
        <button class="btn btn-success">Submit</button>
    </div>
</body>

</html>
