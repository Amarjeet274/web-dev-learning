<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Form </title>
</head>
<style>
    .form-container {
        display: block;

    }
</style>

<body>
    <header class=".abcd">
        <h1>student login form</h1>
    </header>

    <div class="form-container">
        <form action="loginForm" action="#">
            <div><input type="text" id="name" placeholder="student name">
                <label for="name"></label>
            </div>
            <div><input type="text" id="number" placeholder="Enter phone number" required>
                <label for="number"></label>
            </div>
            <div>
                <input type="text" id="roll number" placeholder="Enter your roll number" required>
                <label for="number" class="visually-hidden"></label>
            </div>
            <div>
                <input type="text" id="email" placeholder="Enter your email address" required>
                <label for="email" class="visually-hidden"></label>
            </div>
            <div>
                <input type="text" id="address" placeholder="Enter your address" required>
                <label for="address" class="visually-hidden"></label>
            </div>
            <div>
                <input type="password" id="password" placeholder="Enter your password" required>
                <label for="password" class="visually-hidden"></label>
            </div>
            <div>
                <input type="password" id="confirm password" placeholder="Confirm your password" required>
                <label for="confirm password" class="visually-hidden"></label>
            </div>

            <div>
                <input type="submit" value="Submit">
            </div>
        </form>

    </div>
</body>

</html>
