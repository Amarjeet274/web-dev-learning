<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>new form</title>
</head>

<body>
    <!-- new form create -->
    <form action="/action">
        <div>
            <label for="username">Username : </label>
            <input type="text" id="username" placeholder="Enter your username" name="username">
        </div>
        <div>
            <label for="password">Enter password : </label>
            <input type="password" id="password" placeholder="Enter your password" name="password">
        </div>
        <div>
            <button>Submit</button>
        </div>

    </form>
    <hr>
    <form action="https://www.youtube.com/results?">
        <div>
            <label for="search">SEARCH ON YOUTUBE : </label>
            <input type="text" name="search_query" id="search" placeholder="Search here">
        </div>

        <button>click here</button>
    </form>
    <hr>
    <form action="https://www.google.com/search?">
        <label for="search">search on google : </label>
        <input type="text" name="q" id="search" placeholder="Search here">
        <button>click here</button>
    </form>
    <hr>
    <form action="https://filmyfly.party/site-1.html?">
        <label for="search">search on filmyfly : </label>
        <input type="text" name="to-search" id="search" placeholder="Search here">
        <button>click here</button>


    </form>
    <!-- for radio section -->
    <hr>
    <form action="/severe">
        <caption>select fev fruit</caption>
        <br>
        <input type="radio" name="fruit" id="apple" value="apple" checked>
        <label for="apple">Apple</label>
        <br>
        <input type="radio" name="fruit" id="banana" value="banana" checked>
        <label for="banana">Banana</label>
        <br>
        <input type="radio" name="fruit" id="mango" value="mango" checked>
        <label for="mango">Mango</label>
        <button>Submit</button>


    </form>
    <!-- for checkbox -->
    <hr>
    <form action="/action">
        <caption>Choose a sub : </caption>

        <input type="checkbox" name="subject" id="math" value="math">
        <label for="subject">math</label>
        <input type="checkbox" name="subject" id="science" value="science">
        <label for="subject">science</label>
        <input type="checkbox" name="subject" id="english" value="eng">
        <label for="subject">english</label>
        <button>Submit</button>
        <!-- for range -->
        <div>
            <label for="vol">Select your volume level : </label>
            <input type="range" name="vol" id="vol" min="0" max="100">
            <button>Submit</button>
        </div>
        <!-- for feedback -->
        <div>
            <label for="feedback">enter your feedback : </label>
            <textarea name="feedback" id="feedback" placeholder="Enter your feedback here"></textarea>
            <button>Submit</button>
        </div>
    </form>
    <!-- for dropdown -->
    <div>
        <form action="">
            Choose your profession :
            <select name="profession" id="profession">
                <option>Select a option</option>
                <option value="stu">Student</option>
                <option value="dev">Developer</option>

            </select>
            <button>Submit</button>
    </div>
    </form>

</body>

</html>
